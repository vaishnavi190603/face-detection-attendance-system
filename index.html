<!DOCTYPE html>
<html>

<head>

    <title>Face Attendance System</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <h1>Face Detection Attendance System</h1>

    <!-- ADD USER -->

    <div class="card">

        <h2>Add New User</h2>

        <form action="/add" method="POST">

            <input type="text"
                   name="name"
                   placeholder="Enter Name"
                   required>

            <input type="number"
                   name="userid"
                   placeholder="Enter ID"
                   required>

            <button type="submit">
                Add User
            </button>

        </form>

    </div>

    <!-- ATTENDANCE -->

    <div class="card">

        <h2>Attendance</h2>

        <a href="/start">
            <button class="attendance-btn">
                Start Attendance
            </button>
        </a>

        <a href="/export">
            <button class="export-btn">
                Export Excel
            </button>
        </a>

    </div>

    <!-- SEARCH -->

    <div class="card">

        <h2>Search User</h2>

        <form action="/search" method="POST">

            <input type="text"
                   name="keyword"
                   placeholder="Search Name or ID"
                   required>

            <button type="submit">
                Search
            </button>

        </form>

    </div>

    <!-- TABLE -->

    <div class="card">

        <h2>Attendance Records</h2>

        <table>

            <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Time</th>
            </tr>

            {% for i in range(names|length) %}

            <tr>

                <td>{{ names[i] }}</td>

                <td>{{ ids[i] }}</td>

                <td>{{ times[i] }}</td>

            </tr>

            {% endfor %}

        </table>

    </div>

    <div class="footer">

        Total Registered Users: {{ total }}

    </div>

</div>

</body>

</html>
